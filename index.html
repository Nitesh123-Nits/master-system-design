<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Three Pillars of System Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --night: #09111A;
  --deep: #0F1C26;
  --card: #0D1820;
  --card2: #111E2A;
  --border: rgba(78,205,196,0.1);
  --border2: rgba(255,255,255,0.06);
  --moon: #D6E8EC;
  --muted: rgba(180,210,215,0.45);
  --teal: #4ECDC4;
  --teal-dim: rgba(78,205,196,0.12);
  --coral: #E8826A;
  --coral-dim: rgba(232,130,106,0.12);
  --gold: #D4A843;
  --gold-dim: rgba(212,168,67,0.12);
  --sage: #7EC8A0;
  --text: #C8DDE2;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--night);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

#cosmos { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

.wrapper {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px 100px;
}

/* ── HERO ── */
.hero {
  text-align: center;
  padding: 64px 0 48px;
}

.hero-eyebrow {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}

.hero h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(24px, 5vw, 42px);
  font-weight: 700;
  color: var(--moon);
  letter-spacing: 0.03em;
  line-height: 1.15;
  margin-bottom: 12px;
}

.hero h1 em { font-style: normal; color: var(--teal); }
.hero p {
  font-size: 14px;
  color: var(--muted);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 48px;
}

/* ── TRINITY SEALS ── */
.trinity {
  display: flex;
  justify-content: center;
  gap: clamp(16px, 4vw, 48px);
  margin-bottom: 56px;
  flex-wrap: wrap;
}

.seal-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: transform 0.3s;
}

.seal-wrap:hover { transform: translateY(-3px); }

.seal-svg-wrap {
  position: relative;
  width: 100px;
  height: 100px;
}

.seal-svg-wrap svg { width: 100%; height: 100%; }

.seal-inner {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.seal-pct {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 600;
  line-height: 1;
}

.seal-sub {
  font-size: 8px;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 2px;
}

.seal-name {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: center;
  max-width: 90px;
  line-height: 1.4;
}

.seal-count {
  font-size: 10px;
  color: var(--muted);
}

/* ── GLOBAL STATS ── */
.g-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.g-stat { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.g-stat-num { font-family: 'Cinzel', serif; font-size: 28px; color: var(--moon); }
.g-stat-lbl { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.g-divider { width: 1px; height: 36px; background: var(--border2); align-self: center; }

/* ── PILLAR TABS ── */
.pillar-tabs {
  display: flex;
  gap: 0;
  border: 1px solid var(--border2);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 32px;
}

.ptab {
  flex: 1;
  padding: 14px 8px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'Cinzel', serif;
  font-size: clamp(10px, 2vw, 13px);
  font-weight: 600;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 0.3s;
  border-right: 1px solid var(--border2);
  position: relative;
}

.ptab:last-child { border-right: none; }
.ptab::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: transparent;
  transition: background 0.3s;
}

.ptab[data-pillar="api"].active { color: var(--coral); background: var(--coral-dim); }
.ptab[data-pillar="api"].active::after { background: var(--coral); }
.ptab[data-pillar="db"].active { color: var(--gold); background: var(--gold-dim); }
.ptab[data-pillar="db"].active::after { background: var(--gold); }
.ptab[data-pillar="scale"].active { color: var(--teal); background: var(--teal-dim); }
.ptab[data-pillar="scale"].active::after { background: var(--teal); }
.ptab:not(.active):hover { background: rgba(255,255,255,0.03); color: var(--text); }

/* ── PILLAR PANELS ── */
.pillar-panel { display: none; }
.pillar-panel.active { display: block; }

/* ── PILLAR HEADER ── */
.pillar-header {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 28px;
  border-radius: 16px;
  margin-bottom: 20px;
  border: 1px solid;
}

.pillar-header.api { background: var(--coral-dim); border-color: rgba(232,130,106,0.2); }
.pillar-header.db  { background: var(--gold-dim);  border-color: rgba(212,168,67,0.2); }
.pillar-header.scale { background: var(--teal-dim); border-color: rgba(78,205,196,0.2); }

.pillar-glyph {
  font-size: 36px;
  flex-shrink: 0;
  line-height: 1;
}

.pillar-hinfo { flex: 1; }

.pillar-hname {
  font-family: 'Cinzel', serif;
  font-size: clamp(16px, 3vw, 22px);
  font-weight: 700;
  margin-bottom: 6px;
}

.pillar-header.api .pillar-hname { color: var(--coral); }
.pillar-header.db  .pillar-hname { color: var(--gold); }
.pillar-header.scale .pillar-hname { color: var(--teal); }

.pillar-hdesc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  max-width: 560px;
}

.pillar-hprogress {
  text-align: right;
  flex-shrink: 0;
}

.pillar-hpct {
  font-family: 'Cinzel', serif;
  font-size: 28px;
  font-weight: 700;
}

.pillar-header.api .pillar-hpct { color: var(--coral); }
.pillar-header.db  .pillar-hpct { color: var(--gold); }
.pillar-header.scale .pillar-hpct { color: var(--teal); }

.pillar-hprog-lbl { font-size: 9px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }

.pillar-prog-bar {
  width: 80px;
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  margin: 8px 0 0 auto;
  overflow: hidden;
}

.pillar-prog-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
}

.pillar-header.api .pillar-prog-fill { background: var(--coral); }
.pillar-header.db  .pillar-prog-fill { background: var(--gold); }
.pillar-header.scale .pillar-prog-fill { background: var(--teal); }

/* ── SECTION CARDS ── */
.s-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 14px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.s-card:hover { border-color: rgba(255,255,255,0.1); }
.s-card.s-complete { box-shadow: 0 0 0 1px rgba(126,200,160,0.2) inset; }

.s-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}

.s-header:hover { background: rgba(255,255,255,0.015); }

.s-icon-wrap {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  border: 1px solid;
}

.api-color  { color: var(--coral); background: var(--coral-dim); border-color: rgba(232,130,106,0.2); }
.db-color   { color: var(--gold);  background: var(--gold-dim);  border-color: rgba(212,168,67,0.2); }
.scale-color{ color: var(--teal);  background: var(--teal-dim);  border-color: rgba(78,205,196,0.2); }

.s-info { flex: 1; min-width: 0; }

.s-eyebrow {
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2px;
}

.s-title {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--moon);
}

.s-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 5px;
}

.s-count { font-size: 11px; color: var(--muted); }

.s-bar-wrap {
  flex: 1;
  max-width: 100px;
  height: 2px;
  background: rgba(255,255,255,0.07);
  border-radius: 1px;
  overflow: hidden;
}

.s-bar { height: 100%; border-radius: 1px; transition: width 0.5s ease; }
.api-bar   { background: var(--coral); }
.db-bar    { background: var(--gold); }
.scale-bar { background: var(--teal); }

.s-chevron {
  color: var(--muted);
  font-size: 12px;
  transition: transform 0.35s ease, color 0.2s;
  flex-shrink: 0;
}

.s-card.s-open .s-chevron { transform: rotate(180deg); }

/* ── TOPICS ── */
.s-topics-wrap {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.55s cubic-bezier(0.4,0,0.2,1);
}

.s-card.s-open .s-topics-wrap { max-height: 3000px; }

.s-topics-inner {
  padding: 0 20px 20px;
  border-top: 1px solid var(--border2);
}

/* section description */
.s-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.7;
  padding: 14px 0 10px;
  border-bottom: 1px solid var(--border2);
  margin-bottom: 14px;
}

.topics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 8px;
  margin-bottom: 16px;
}

.t-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: rgba(255,255,255,0.01);
  cursor: pointer;
  transition: all 0.22s;
}

.t-item:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); }

.t-item.t-done.api-done   { background: rgba(232,130,106,0.06); border-color: rgba(232,130,106,0.2); }
.t-item.t-done.db-done    { background: rgba(212,168,67,0.06);  border-color: rgba(212,168,67,0.2); }
.t-item.t-done.scale-done { background: rgba(78,205,196,0.06);  border-color: rgba(78,205,196,0.2); }

.t-check {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  transition: all 0.25s;
}

.t-item.t-done.api-done   .t-check { background: var(--coral); border-color: var(--coral); }
.t-item.t-done.db-done    .t-check { background: var(--gold);  border-color: var(--gold); }
.t-item.t-done.scale-done .t-check { background: var(--teal);  border-color: var(--teal); }

.t-check-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: transparent;
  transition: background 0.2s;
}

.t-item.t-done .t-check-dot { background: white; }

.t-body { flex: 1; min-width: 0; }

.t-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 3px;
  transition: color 0.2s;
}

.t-item.t-done.api-done   .t-name { color: var(--coral); }
.t-item.t-done.db-done    .t-name { color: var(--gold); }
.t-item.t-done.scale-done .t-name { color: var(--teal); }

.t-desc {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.5;
}

/* tags */
.t-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
.t-tag {
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  color: var(--muted);
}

.tag-critical { border-color: rgba(232,130,106,0.3); color: var(--coral); }
.tag-security { border-color: rgba(212,168,67,0.3); color: var(--gold); }
.tag-perf     { border-color: rgba(78,205,196,0.3); color: var(--teal); }
.tag-pattern  { border-color: rgba(126,200,160,0.3); color: var(--sage); }

.s-actions {
  display: flex;
  gap: 8px;
  padding-top: 14px;
  border-top: 1px solid var(--border2);
}

.btn-sm {
  padding: 7px 14px;
  border-radius: 7px;
  font-size: 11px;
  letter-spacing: 0.06em;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  transition: all 0.2s;
}

.btn-sm:hover { color: var(--sage); border-color: rgba(126,200,160,0.3); }
.btn-sm.danger:hover { color: rgba(200,100,100,0.8); border-color: rgba(200,100,100,0.3); }

/* ── SEARCH ── */
.search-row {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  align-items: center;
}

.search-wrap {
  position: relative;
  flex: 1;
}

.search-wrap input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 11px 16px 11px 40px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.3s;
}

.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus { border-color: rgba(78,205,196,0.3); }

.s-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--deep);
  border: 1px solid rgba(78,205,196,0.25);
  color: var(--teal);
  padding: 11px 24px;
  border-radius: 40px;
  font-size: 13px;
  letter-spacing: 0.06em;
  z-index: 999;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .pillar-hprogress { display: none; }
  .pillar-header { padding: 20px; }
  .topics-grid { grid-template-columns: 1fr; }
  .trinity { gap: 20px; }
  .seal-svg-wrap { width: 80px; height: 80px; }
  .g-divider { display: none; }
  .s-header { padding: 14px 16px; }
  .s-topics-inner { padding: 0 14px 16px; }
  .ptab { font-size: 10px; padding: 12px 4px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: 0.01ms !important; }
}

.hidden-card { display: none; }
</style>
</head>
<body>

<canvas id="cosmos"></canvas>

<div class="wrapper">

  <!-- HERO -->
  <header class="hero">
    <p class="hero-eyebrow">System Architecture Mastery Series</p>
    <h1>The Three Pillars of<br><em>System Mastery</em></h1>
    <p>API · Database · Scaling — A Complete Learning Codex</p>

    <!-- TRINITY SEALS -->
    <div class="trinity">
      <div class="seal-wrap" onclick="switchPillar('api')">
        <div class="seal-svg-wrap">
          <svg viewBox="0 0 100 100">
            <polygon points="50,4 95,27 95,73 50,96 5,73 5,27"
              fill="none" stroke="rgba(232,130,106,0.12)" stroke-width="2"/>
            <polygon points="50,4 95,27 95,73 50,96 5,73 5,27"
              fill="none" stroke="var(--coral)" stroke-width="2"
              stroke-dasharray="276" id="sealApi"
              stroke-dashoffset="276"
              style="transition:stroke-dashoffset 1.2s ease;filter:drop-shadow(0 0 6px rgba(232,130,106,0.5))"/>
          </svg>
          <div class="seal-inner">
            <span class="seal-pct" style="color:var(--coral)" id="pctApi">0%</span>
            <span class="seal-sub">mastered</span>
          </div>
        </div>
        <span class="seal-name" style="color:var(--coral)">API Security & Optimization</span>
        <span class="seal-count" id="cntApi">— topics</span>
      </div>

      <div class="seal-wrap" onclick="switchPillar('db')">
        <div class="seal-svg-wrap">
          <svg viewBox="0 0 100 100">
            <polygon points="50,4 95,27 95,73 50,96 5,73 5,27"
              fill="none" stroke="rgba(212,168,67,0.12)" stroke-width="2"/>
            <polygon points="50,4 95,27 95,73 50,96 5,73 5,27"
              fill="none" stroke="var(--gold)" stroke-width="2"
              stroke-dasharray="276" id="sealDb"
              stroke-dashoffset="276"
              style="transition:stroke-dashoffset 1.2s ease;filter:drop-shadow(0 0 6px rgba(212,168,67,0.5))"/>
          </svg>
          <div class="seal-inner">
            <span class="seal-pct" style="color:var(--gold)" id="pctDb">0%</span>
            <span class="seal-sub">mastered</span>
          </div>
        </div>
        <span class="seal-name" style="color:var(--gold)">Database Optimization</span>
        <span class="seal-count" id="cntDb">— topics</span>
      </div>

      <div class="seal-wrap" onclick="switchPillar('scale')">
        <div class="seal-svg-wrap">
          <svg viewBox="0 0 100 100">
            <polygon points="50,4 95,27 95,73 50,96 5,73 5,27"
              fill="none" stroke="rgba(78,205,196,0.12)" stroke-width="2"/>
            <polygon points="50,4 95,27 95,73 50,96 5,73 5,27"
              fill="none" stroke="var(--teal)" stroke-width="2"
              stroke-dasharray="276" id="sealScale"
              stroke-dashoffset="276"
              style="transition:stroke-dashoffset 1.2s ease;filter:drop-shadow(0 0 6px rgba(78,205,196,0.5))"/>
          </svg>
          <div class="seal-inner">
            <span class="seal-pct" style="color:var(--teal)" id="pctScale">0%</span>
            <span class="seal-sub">mastered</span>
          </div>
        </div>
        <span class="seal-name" style="color:var(--teal)">Scaling Systems</span>
        <span class="seal-count" id="cntScale">— topics</span>
      </div>
    </div>

    <!-- GLOBAL STATS -->
    <div class="g-stats">
      <div class="g-stat"><span class="g-stat-num" id="gDone">0</span><span class="g-stat-lbl">Mastered</span></div>
      <div class="g-divider"></div>
      <div class="g-stat"><span class="g-stat-num" id="gTotal">0</span><span class="g-stat-lbl">Total Topics</span></div>
      <div class="g-divider"></div>
      <div class="g-stat"><span class="g-stat-num" id="gSections">0</span><span class="g-stat-lbl">Disciplines</span></div>
    </div>
  </header>

  <!-- TABS -->
  <div class="pillar-tabs">
    <button class="ptab active" data-pillar="api" onclick="switchPillar('api')">⬡ API Security &amp; Optimization</button>
    <button class="ptab" data-pillar="db" onclick="switchPillar('db')">◈ Database Optimization</button>
    <button class="ptab" data-pillar="scale" onclick="switchPillar('scale')">✦ Scaling Systems</button>
  </div>

  <!-- PANELS -->
  <div id="panelApi" class="pillar-panel active"></div>
  <div id="panelDb" class="pillar-panel"></div>
  <div id="panelScale" class="pillar-panel"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────

const PILLARS = {
  api: {
    id: 'api',
    glyph: '⬡',
    name: 'API Security & Optimization',
    desc: 'The art of crafting APIs that are both fast and fortified — designing interfaces that resist attack, scale gracefully, and respond with precision.',
    colorClass: 'api-color',
    barClass: 'api-bar',
    doneClass: 'api-done',
    accent: 'var(--coral)',
    sections: [
      {
        id: 'api-design', icon: '◎', label: 'API Design Principles',
        desc: 'The foundation of every great API is intentional design. These concepts ensure your API is intuitive, versionable, and contract-driven from day one.',
        topics: [
          { name: 'RESTful Resource Modeling', desc: 'Nouns not verbs, hierarchical resources, proper HTTP semantics', tags: ['pattern'] },
          { name: 'OpenAPI / Swagger Spec', desc: 'Contract-first design with machine-readable API documentation', tags: ['pattern'] },

          { name: 'USE Method (Utilization, Saturation, Errors)', desc: 'Resource-oriented monitoring — CPU runqueue, memory OOM, disk I/O', tags: ['perf'] },
          { name: 'Distributed Tracing', desc: 'Span propagation, sampling strategies, trace-based alerting (Jaeger/Tempo)', tags: ['critical'] },
          { name: 'OpenTelemetry at Scale', desc: 'Collector architecture, sampling, metric cardinality control', tags: ['pattern', 'perf'] },
          { name: 'SLO-Based Alerting', desc: 'Error budget burn rate alerts vs threshold alerts — fewer false positives', tags: ['critical'] },
          { name: 'Cardinality in Metrics', desc: 'High-cardinality label explosion in Prometheus — design guardrails', tags: ['perf', 'critical'] },
          { name: 'Log Aggregation at Scale', desc: 'Fluentd/Fluent Bit, Loki, Elasticsearch — sampling, retention cost', tags: ['perf'] },
          { name: 'On-Call & Incident Response', desc: 'Runbooks, escalation policies, blameless postmortems, chaos drills', tags: ['critical'] },
        ]
      },
    ]
  }
};

// ── STATE ─────────────────────────────────────────────────────
const STORE = 'mastery_v1';
let state = {};

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORE)) || {}; } catch { state = {}; }
}

function saveState() { localStorage.setItem(STORE, JSON.stringify(state)); }

function isDone(pillar, secId, topic) {
  return !!(state[pillar] && state[pillar][secId] && state[pillar][secId][topic]);
}

function toggle(pillar, secId, topic) {
  if (!state[pillar]) state[pillar] = {};
  if (!state[pillar][secId]) state[pillar][secId] = {};
  state[pillar][secId][topic] = !state[pillar][secId][topic];
  if (!state[pillar][secId][topic]) delete state[pillar][secId][topic];
  saveState();
}

function markAllSec(pillar, secId, done) {
  const sec = PILLARS[pillar].sections.find(s => s.id === secId);
  if (!sec) return;
  if (!state[pillar]) state[pillar] = {};
  if (done) {
    state[pillar][secId] = {};
    sec.topics.forEach(t => { state[pillar][secId][t.name] = true; });
  } else {
    delete state[pillar][secId];
  }
  saveState();
}

// ── COUNTS ───────────────────────────────────────────────────
function pillarStats(pid) {
  const p = PILLARS[pid];
  let done = 0, total = 0;
  p.sections.forEach(sec => {
    sec.topics.forEach(t => {
      total++;
      if (isDone(pid, sec.id, t.name)) done++;
    });
  });
  return { done, total };
}

function globalStats() {
  let done = 0, total = 0, secs = 0;
  Object.keys(PILLARS).forEach(pid => {
    const { done: d, total: t } = pillarStats(pid);
    done += d; total += t;
    secs += PILLARS[pid].sections.length;
  });
  return { done, total, secs };
}

// ── RENDER PILLAR ─────────────────────────────────────────────
function renderPillar(pid) {
  const p = PILLARS[pid];
  const panel = document.getElementById('panel' + pid.charAt(0).toUpperCase() + pid.slice(1));
  panel.innerHTML = '';

  // header
  const { done, total } = pillarStats(pid);
  const pct = total ? Math.round(done / total * 100) : 0;

  const hdr = document.createElement('div');
  hdr.className = `pillar-header ${pid}`;
  hdr.id = `hdr-${pid}`;
  hdr.innerHTML = `
    <div class="pillar-glyph">${p.glyph}</div>
    <div class="pillar-hinfo">
      <div class="pillar-hname">${p.name}</div>
      <div class="pillar-hdesc">${p.desc}</div>
    </div>
    <div class="pillar-hprogress">
      <div class="pillar-hpct" id="hpct-${pid}">${pct}%</div>
      <div class="pillar-hprog-lbl">${done} / ${total} mastered</div>
      <div class="pillar-prog-bar"><div class="pillar-prog-fill" id="hbar-${pid}" style="width:${pct}%"></div></div>
    </div>
  `;
  panel.appendChild(hdr);

  // search
  const sr = document.createElement('div');
  sr.className = 'search-row';
  sr.innerHTML = `
    <div class="search-wrap">
      <span class="s-icon">⌕</span>
      <input type="text" placeholder="Search within this pillar…" id="search-${pid}">
    </div>
  `;
  panel.appendChild(sr);

  sr.querySelector('input').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    panel.querySelectorAll('.s-card').forEach(card => {
      const matches = !q || card.dataset.title.toLowerCase().includes(q) ||
        [...card.querySelectorAll('.t-name')].some(n => n.textContent.toLowerCase().includes(q));
      card.classList.toggle('hidden-card', !matches);
      if (matches && q) {
        card.querySelectorAll('.t-item').forEach(item => {
          const tn = item.querySelector('.t-name').textContent.toLowerCase();
          item.style.opacity = tn.includes(q) ? '1' : '0.4';
        });
      } else {
        card.querySelectorAll('.t-item').forEach(item => item.style.opacity = '1');
      }
    });
  });

  // sections
  p.sections.forEach(sec => {
    const secDone = sec.topics.filter(t => isDone(pid, sec.id, t.name)).length;
    const secTotal = sec.topics.length;
    const secPct = secTotal ? secDone / secTotal : 0;
    const isComplete = secDone === secTotal;

    const card = document.createElement('div');
    card.className = `s-card${isComplete ? ' s-complete' : ''}`;
    card.dataset.secId = sec.id;
    card.dataset.pid = pid;
    card.dataset.title = sec.label;

    card.innerHTML = `
      <div class="s-header">
        <div class="s-icon-wrap ${pid}-color">${sec.icon}</div>
        <div class="s-info">
          <div class="s-eyebrow">${p.name}</div>
          <div class="s-title">${sec.label}</div>
          <div class="s-meta">
            <span class="s-count">${secDone} / ${secTotal}</span>
            <div class="s-bar-wrap"><div class="s-bar ${pid}-bar" style="width:${secPct*100}%"></div></div>
          </div>
        </div>
        <span class="s-chevron">▾</span>
      </div>
      <div class="s-topics-wrap">
        <div class="s-topics-inner">
          <div class="s-desc">${sec.desc}</div>
          <div class="topics-grid">
            ${sec.topics.map(t => `
              <div class="t-item ${isDone(pid, sec.id, t.name) ? `t-done ${pid}-done` : ''}" data-topic="${escHtml(t.name)}">
                <div class="t-check"><div class="t-check-dot"></div></div>
                <div class="t-body">
                  <div class="t-name">${escHtml(t.name)}</div>
                  <div class="t-desc">${escHtml(t.desc)}</div>
                  <div class="t-tags">${(t.tags||[]).map(tag => `<span class="t-tag tag-${tag}">${tag}</span>`).join('')}</div>
                </div>
              </div>
            `).join('')}
          </div>
          <div class="s-actions">
            <button class="btn-sm btn-mark-all">Mark all complete</button>
            <button class="btn-sm danger btn-clear-sec">Clear section</button>
          </div>
        </div>
      </div>
    `;

    // toggle
    card.querySelector('.s-header').addEventListener('click', () => {
      card.classList.toggle('s-open');
    });

    // topic click
    card.querySelectorAll('.t-item').forEach(item => {
      item.addEventListener('click', () => {
        const tname = item.dataset.topic;
        toggle(pid, sec.id, tname);
        item.classList.toggle('t-done');
        item.classList.toggle(`${pid}-done`);
        updateCardMeta(card, pid, sec);
        updatePillarHeader(pid);
        updateSeals();
        updateGlobalStats();
      });
    });

    card.querySelector('.btn-mark-all').addEventListener('click', e => {
      e.stopPropagation();
      markAllSec(pid, sec.id, true);
      renderPillar(pid);
      updateSeals();
      updateGlobalStats();
      showToast(`✦ ${sec.label} — mastered`);
    });

    card.querySelector('.btn-clear-sec').addEventListener('click', e => {
      e.stopPropagation();
      markAllSec(pid, sec.id, false);
      renderPillar(pid);
      updateSeals();
      updateGlobalStats();
    });

    panel.appendChild(card);
  });
}

function updateCardMeta(card, pid, sec) {
  const secDone = sec.topics.filter(t => isDone(pid, sec.id, t.name)).length;
  const secTotal = sec.topics.length;
  card.querySelector('.s-count').textContent = `${secDone} / ${secTotal}`;
  card.querySelector('.s-bar').style.width = `${(secDone / secTotal) * 100}%`;
  card.classList.toggle('s-complete', secDone === secTotal);
}

function updatePillarHeader(pid) {
  const { done, total } = pillarStats(pid);
  const pct = total ? Math.round(done / total * 100) : 0;
  const el = document.getElementById(`hpct-${pid}`);
  const bar = document.getElementById(`hbar-${pid}`);
  if (el) { el.textContent = `${pct}%`; el.nextElementSibling.textContent = `${done} / ${total} mastered`; }
  if (bar) bar.style.width = `${pct}%`;
}

function updateSeals() {
  ['api', 'db', 'scale'].forEach(pid => {
    const { done, total } = pillarStats(pid);
    const pct = total ? done / total : 0;
    const offset = 276 - pct * 276;
    const sealEl = document.getElementById('seal' + pid.charAt(0).toUpperCase() + pid.slice(1));
    if (sealEl) sealEl.style.strokeDashoffset = offset;
    const pctEl = document.getElementById('pct' + pid.charAt(0).toUpperCase() + pid.slice(1));
    if (pctEl) pctEl.textContent = Math.round(pct * 100) + '%';
    const cntEl = document.getElementById('cnt' + pid.charAt(0).toUpperCase() + pid.slice(1));
    if (cntEl) cntEl.textContent = `${done} / ${total} topics`;
  });
}

function updateGlobalStats() {
  const { done, total, secs } = globalStats();
  document.getElementById('gDone').textContent = done;
  document.getElementById('gTotal').textContent = total;
  document.getElementById('gSections').textContent = secs;
}

// ── TABS ─────────────────────────────────────────────────────
function switchPillar(pid) {
  document.querySelectorAll('.ptab').forEach(t => t.classList.toggle('active', t.dataset.pillar === pid));
  document.querySelectorAll('.pillar-panel').forEach(p => p.classList.remove('active'));
  const panelId = 'panel' + pid.charAt(0).toUpperCase() + pid.slice(1);
  document.getElementById(panelId).classList.add('active');
}

// ── TOAST ────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── COSMOS ───────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('cosmos');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [], blobs = [];

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

  function init() {
    stars = Array.from({length: 100}, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.1 + 0.2,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.004 + 0.001
    }));
    blobs = Array.from({length: 14}, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.15, vy: (Math.random() - 0.5) * 0.15,
      r: Math.random() * 80 + 30,
      a: Math.random() * 0.035 + 0.008,
      color: ['78,205,196','232,130,106','212,168,67','126,200,160'][Math.floor(Math.random()*4)]
    }));
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    t += 0.008;

    blobs.forEach(b => {
      b.x += b.vx; b.y += b.vy;
      if (b.x < -b.r) b.x = W + b.r;
      if (b.x > W + b.r) b.x = -b.r;
      if (b.y < -b.r) b.y = H + b.r;
      if (b.y > H + b.r) b.y = -b.r;
      const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      g.addColorStop(0, `rgba(${b.color},${b.a})`);
      g.addColorStop(1, `rgba(${b.color},0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    });

    stars.forEach(s => {
      const alpha = 0.25 + 0.45 * Math.sin(t * s.speed * 120 + s.phase);
      ctx.fillStyle = `rgba(190,215,225,${alpha})`;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  resize(); init(); draw();
  window.addEventListener('resize', () => { resize(); init(); });
})();

// ── INIT ─────────────────────────────────────────────────────
loadState();
renderPillar('api');
renderPillar('db');
renderPillar('scale');
updateSeals();
updateGlobalStats();
</script>
