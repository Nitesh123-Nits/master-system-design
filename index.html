<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Path of Distributed Wisdom</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --night: #0D0F1A;
    --deep: #1A1D2E;
    --card: #151828;
    --border: rgba(139,147,200,0.15);
    --moon: #C8D6E5;
    --lavender: #8B93C8;
    --amber: #F0A500;
    --amber-dim: rgba(240,165,0,0.15);
    --sage: #A8C5A0;
    --text: #D4DCEF;
    --muted: rgba(200,214,229,0.45);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--night);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── CANVAS BACKGROUND ── */
  #cosmos {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 72px 0 48px;
  }

  .mandala-ring {
    position: relative;
    width: 120px;
    height: 120px;
    margin: 0 auto 28px;
  }

  .mandala-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-bg { fill: none; stroke: rgba(139,147,200,0.12); stroke-width: 6; }
  .ring-fill {
    fill: none;
    stroke: var(--amber);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 345;
    stroke-dashoffset: 345;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
    filter: drop-shadow(0 0 8px rgba(240,165,0,0.6));
  }

  .mandala-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .mandala-pct {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--amber);
    line-height: 1;
  }

  .mandala-label {
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .hero h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 5vw, 38px);
    font-weight: 600;
    color: var(--moon);
    letter-spacing: 0.04em;
    line-height: 1.2;
    margin-bottom: 12px;
  }

  .hero h1 span { color: var(--amber); }

  .hero p {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  /* ── STATS BAR ── */
  .stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
    margin-bottom: 52px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat-num {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--moon);
  }

  .stat-lbl {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-divider {
    width: 1px;
    height: 40px;
    background: var(--border);
    align-self: center;
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    max-width: 420px;
    margin: 0 auto 40px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--deep);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 12px 20px 12px 44px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .search-wrap input::placeholder { color: var(--muted); }

  .search-wrap input:focus {
    border-color: rgba(139,147,200,0.4);
    box-shadow: 0 0 0 3px rgba(139,147,200,0.06);
  }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  /* ── FILTER PILLS ── */
  .filter-pills {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }

  .pill {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
    font-family: 'Inter', sans-serif;
  }

  .pill:hover { border-color: var(--lavender); color: var(--lavender); }
  .pill.active { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }

  /* ── SECTION CARDS ── */
  .section-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .section-card:hover { border-color: rgba(139,147,200,0.28); }
  .section-card.complete { border-color: rgba(168,197,160,0.3); }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }

  .section-header:hover { background: rgba(255,255,255,0.02); }

  /* small arc */
  .arc-wrap {
    position: relative;
    width: 48px;
    height: 48px;
    flex-shrink: 0;
  }

  .arc-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .arc-bg { fill: none; stroke: rgba(139,147,200,0.1); stroke-width: 4; }
  .arc-fill {
    fill: none;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 126;
    stroke-dashoffset: 126;
    transition: stroke-dashoffset 0.8s ease, stroke 0.4s;
  }

  .arc-icon {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .section-info { flex: 1; min-width: 0; }

  .section-eyebrow {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--moon);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .section-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 6px;
  }

  .section-count {
    font-size: 12px;
    color: var(--muted);
  }

  .section-bar-wrap {
    flex: 1;
    max-width: 120px;
    height: 3px;
    background: rgba(139,147,200,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .section-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .chevron {
    color: var(--muted);
    font-size: 14px;
    transition: transform 0.35s ease, color 0.2s;
    flex-shrink: 0;
  }

  .section-card.open .chevron { transform: rotate(180deg); color: var(--lavender); }

  /* ── TOPICS GRID ── */
  .topics-wrap {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.55s cubic-bezier(0.4,0,0.2,1);
  }

  .section-card.open .topics-wrap { max-height: 2000px; }

  .topics-inner {
    padding: 0 24px 24px;
    border-top: 1px solid var(--border);
  }

  .topics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    margin-top: 16px;
  }

  .topic-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.015);
    cursor: pointer;
    transition: all 0.2s;
  }

  .topic-item:hover { background: rgba(139,147,200,0.06); border-color: rgba(139,147,200,0.25); }
  .topic-item.done { background: rgba(168,197,160,0.06); border-color: rgba(168,197,160,0.2); }

  .topic-cb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid rgba(139,147,200,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s;
  }

  .topic-item.done .topic-cb {
    background: var(--sage);
    border-color: var(--sage);
  }

  .topic-cb-inner {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: transparent;
    transition: background 0.2s;
  }

  .topic-item.done .topic-cb-inner { background: white; }

  .topic-name {
    font-size: 13px;
    color: var(--text);
    line-height: 1.3;
    transition: color 0.2s;
  }

  .topic-item.done .topic-name {
    color: var(--sage);
  }

  /* section complete actions */
  .section-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .btn-small {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    letter-spacing: 0.06em;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
  }

  .btn-small:hover { border-color: var(--sage); color: var(--sage); }

  .btn-small.danger:hover { border-color: rgba(200,100,100,0.4); color: rgba(200,100,100,0.8); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--deep);
    border: 1px solid rgba(168,197,160,0.3);
    color: var(--sage);
    padding: 12px 24px;
    border-radius: 40px;
    font-size: 13px;
    letter-spacing: 0.06em;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .section-header { padding: 16px 16px; gap: 12px; }
    .topics-inner { padding: 0 16px 20px; }
    .topics-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
    .topic-item { padding: 9px 10px; }
    .stat-divider { display: none; }
  }

  @media (max-width: 400px) {
    .topics-grid { grid-template-columns: 1fr; }
  }

  /* ── REDUCED MOTION ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition-duration: 0.01ms !important; }
  }

  /* hidden search */
  .section-card.hidden { display: none; }
</style>
</head>
<body>

<canvas id="cosmos"></canvas>

<div class="wrapper">

  <!-- HERO -->
  <header class="hero">
    <div class="mandala-ring">
      <svg viewBox="0 0 120 120">
        <circle class="ring-bg" cx="60" cy="60" r="55"/>
        <circle class="ring-fill" id="globalRing" cx="60" cy="60" r="55"/>
      </svg>
      <div class="mandala-inner">
        <span class="mandala-pct" id="globalPct">0%</span>
        <span class="mandala-label">complete</span>
      </div>
    </div>
    <h1>The Path of<br><span>Distributed Wisdom</span></h1>
    <p>A Sacred Map of Microservices & Distributed Systems</p>
  </header>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><span class="stat-num" id="statDone">0</span><span class="stat-lbl">Mastered</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-num" id="statTotal">0</span><span class="stat-lbl">Teachings</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-num" id="statSections">0</span><span class="stat-lbl">Realms</span></div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Seek a teaching…" autocomplete="off">
  </div>

  <!-- FILTER PILLS -->
  <div class="filter-pills">
    <button class="pill active" data-filter="all">All Realms</button>
    <button class="pill" data-filter="inprogress">In Progress</button>
    <button class="pill" data-filter="complete">Complete</button>
    <button class="pill" data-filter="untouched">Untouched</button>
  </div>

  <!-- SECTIONS -->
  <div id="sectionsContainer"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────
const sections = [
  {

  {

  },
  {
    id: 7, icon: '◬', title: 'Caching Systems', realm: 'VII',
    color: '#8BC8B5',
    topics: ['Cache Aside','Write Through','Write Back','Read Through','Distributed Cache','TTL','Cache Invalidation','Hot Keys','Cache Stampede','Bloom Filters','Redis','Memcached']
  },
  {

  {

    color: '#F0A500',
    topics: ['CAP Theorem','Consistent Hashing','Kafka Internals','Redis Internals','Kubernetes Basics','Docker Networking','Saga Pattern','CQRS','Event Sourcing','API Gateway','Circuit Breaker','Service Discovery','Load Balancing','Distributed Locking','Idempotency','Sharding','Replication','Caching Strategies','gRPC vs REST','SQL vs NoSQL','Observability','Scaling Strategies','Kubernetes Networking','Service Mesh','Consensus Algorithms','Distributed Transactions']
  }
];

// ── STORAGE ───────────────────────────────────────────────────
const STORE_KEY = 'dstrack_v1';
let state = {};

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch { state = {}; }
}

function saveState() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

function isTopicDone(secId, topic) {
  return !!(state[secId] && state[secId][topic]);
}

function toggleTopic(secId, topic) {
  if (!state[secId]) state[secId] = {};
  state[secId][topic] = !state[secId][topic];
  if (!state[secId][topic]) delete state[secId][topic];
  saveState();
}

function markAllSection(secId, done) {
  if (done) {
    state[secId] = {};
    sections.find(s => s.id === secId).topics.forEach(t => { state[secId][t] = true; });
  } else {
    delete state[secId];
  }
  saveState();
}

// ── BUILD UI ─────────────────────────────────────────────────
function buildSections() {
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = '';

  sections.forEach(sec => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.dataset.secId = sec.id;

    const doneCount = sec.topics.filter(t => isTopicDone(sec.id, t)).length;
    const total = sec.topics.length;
    const pct = total ? doneCount / total : 0;
    const arcOffset = 126 - (pct * 126);
    const isComplete = doneCount === total;
    if (isComplete) card.classList.add('complete');

    card.innerHTML = `
      <div class="section-header">
        <div class="arc-wrap">
          <svg viewBox="0 0 48 48">
            <circle class="arc-bg" cx="24" cy="24" r="20"/>
            <circle class="arc-fill" cx="24" cy="24" r="20"
              style="stroke:${sec.color}; stroke-dashoffset:${arcOffset}; filter: drop-shadow(0 0 5px ${sec.color}66)"/>
          </svg>
          <div class="arc-icon">${sec.icon}</div>
        </div>
        <div class="section-info">
          <div class="section-eyebrow">Realm ${sec.realm}</div>
          <div class="section-title">${sec.title}</div>
          <div class="section-meta">
            <span class="section-count">${doneCount} / ${total}</span>
            <div class="section-bar-wrap">
              <div class="section-bar" style="width:${pct*100}%; background:${sec.color};"></div>
            </div>
          </div>
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="topics-wrap">
        <div class="topics-inner">
          <div class="topics-grid">
            ${sec.topics.map(t => `
              <div class="topic-item ${isTopicDone(sec.id, t) ? 'done' : ''}" data-topic="${escHtml(t)}">
                <div class="topic-cb"><div class="topic-cb-inner"></div></div>
                <span class="topic-name">${escHtml(t)}</span>
              </div>
            `).join('')}
          </div>
          <div class="section-actions">
            <button class="btn-small btn-mark-all">Mark all complete</button>
            <button class="btn-small danger btn-clear">Clear section</button>
          </div>
        </div>
      </div>
    `;

    // toggle open
    card.querySelector('.section-header').addEventListener('click', () => {
      card.classList.toggle('open');
    });

    // topic clicks
    card.querySelectorAll('.topic-item').forEach(item => {
      item.addEventListener('click', () => {
        const topic = item.dataset.topic;
        toggleTopic(sec.id, topic);
        item.classList.toggle('done');
        updateCard(card, sec);
        updateGlobal();
      });
    });

    // mark all
    card.querySelector('.btn-mark-all').addEventListener('click', e => {
      e.stopPropagation();
      markAllSection(sec.id, true);
      rebuildCard(card, sec);
      updateGlobal();
      showToast('✦ Realm mastered — well done');
    });

    // clear
    card.querySelector('.btn-clear').addEventListener('click', e => {
      e.stopPropagation();
      markAllSection(sec.id, false);
      rebuildCard(card, sec);
      updateGlobal();
    });

    container.appendChild(card);
  });

  updateGlobal();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateCard(card, sec) {
  const doneCount = sec.topics.filter(t => isTopicDone(sec.id, t)).length;
  const total = sec.topics.length;
  const pct = total ? doneCount / total : 0;

  card.querySelector('.section-count').textContent = `${doneCount} / ${total}`;
  card.querySelector('.section-bar').style.width = `${pct * 100}%`;
  const offset = 126 - pct * 126;
  card.querySelector('.arc-fill').style.strokeDashoffset = offset;
  card.classList.toggle('complete', doneCount === total);
}

function rebuildCard(card, sec) {
  const wasOpen = card.classList.contains('open');
  const newCard = card.cloneNode(false);
  card.parentNode.replaceChild(newCard, card);
  // rebuild fully
  buildSections();
  if (wasOpen) {
    document.querySelector(`[data-sec-id="${sec.id}"]`).classList.add('open');
  }
}

function updateGlobal() {
  let done = 0, total = 0;
  sections.forEach(sec => {
    sec.topics.forEach(t => {
      total++;
      if (isTopicDone(sec.id, t)) done++;
    });
  });

  document.getElementById('statDone').textContent = done;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statSections').textContent = sections.length;

  const pct = total ? done / total : 0;
  const offset = 345 - pct * 345;
  document.getElementById('globalRing').style.strokeDashoffset = offset;
  document.getElementById('globalPct').textContent = Math.round(pct * 100) + '%';
}

// ── SEARCH ───────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.section-card').forEach(card => {
    const sec = sections.find(s => s.id == card.dataset.secId);
    if (!sec) return;
    const titleMatch = sec.title.toLowerCase().includes(q);
    const topicMatch = sec.topics.some(t => t.toLowerCase().includes(q));
    const show = !q || titleMatch || topicMatch;
    card.classList.toggle('hidden', !show);
    if (show && q && topicMatch && !titleMatch) card.classList.add('open');
    // highlight matching topics
    card.querySelectorAll('.topic-item').forEach(item => {
      const tn = item.dataset.topic.toLowerCase();
      item.style.opacity = (!q || tn.includes(q)) ? '1' : '0.3';
    });
  });
});

// ── FILTER PILLS ─────────────────────────────────────────────
document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    const f = pill.dataset.filter;
    document.querySelectorAll('.section-card').forEach(card => {
      const sec = sections.find(s => s.id == card.dataset.secId);
      if (!sec) return;
      const doneCount = sec.topics.filter(t => isTopicDone(sec.id, t)).length;
      const total = sec.topics.length;
      if (f === 'all') card.classList.remove('hidden');
      else if (f === 'complete') card.classList.toggle('hidden', doneCount < total);
      else if (f === 'untouched') card.classList.toggle('hidden', doneCount > 0);
      else if (f === 'inprogress') card.classList.toggle('hidden', doneCount === 0 || doneCount === total);
    });
  });
});

// ── TOAST ────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

// ── COSMOS BACKGROUND ────────────────────────────────────────
(function initCosmos() {
  const canvas = document.getElementById('cosmos');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [], particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.003 + 0.001,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function initParticles() {
    particles = [];
    for (let i = 0; i < 18; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.18,
        vy: (Math.random() - 0.5) * 0.18,
        r: Math.random() * 60 + 20,
        a: Math.random() * 0.04 + 0.01,
        hue: Math.random() < 0.5 ? '139,147,200' : '240,165,0'
      });
    }
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    t += 0.01;

    // nebula blobs
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -p.r) p.x = W + p.r;
      if (p.x > W + p.r) p.x = -p.r;
      if (p.y < -p.r) p.y = H + p.r;
      if (p.y > H + p.r) p.y = -p.r;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      g.addColorStop(0, `rgba(${p.hue},${p.a})`);
      g.addColorStop(1, `rgba(${p.hue},0)`);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });

    // stars
    stars.forEach(s => {
      const alpha = 0.3 + 0.5 * Math.sin(t * s.speed * 100 + s.phase);
      ctx.fillStyle = `rgba(200,214,229,${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  resize();
  initStars();
  initParticles();
  draw();
  window.addEventListener('resize', () => { resize(); initStars(); initParticles(); });
})();

// ── INIT ─────────────────────────────────────────────────────
loadState();
buildSections();
</script>
